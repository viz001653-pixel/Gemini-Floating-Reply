name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r gemini-floating-reply.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "*.DS_Store" \
            --exclude "README.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: gemini-floating-reply.zip
          generate_release_notes: true
          body: |
            ## 安装方法 / Installation
            1. 下载 `gemini-floating-reply.zip` 并解压 / Download and extract the zip
            2. Chrome → `chrome://extensions/` → 开启开发者模式 / Enable Developer Mode
            3. 加载已解压的扩展程序 / Load Unpacked → select the extracted folder
